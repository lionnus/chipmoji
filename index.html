<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <title>%SITE_TITLE%</title>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <link rel="canonical" href="%SITE_URL%" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%SITE_NAME%" />
    <meta property="og:title" content="%SITE_NAME%" />
    <meta property="og:description" content="%SITE_TAGLINE%" />
    <meta property="og:url" content="%SITE_URL%" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="%SITE_NAME%" />
    <meta name="twitter:description" content="%SITE_TAGLINE%" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "%SITE_NAME%",
        "url": "%SITE_URL%"
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "%SITE_NAME%",
        "url": "%SITE_URL%",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "description": "%SITE_DESCRIPTION%",
        "author": { "@type": "Person", "name": "Lionnus Kesting" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>%SITE_NAME%</h1>
      <p>%SITE_DESCRIPTION%</p>
      <p>This app needs JavaScript enabled to browse, search, and copy commit emojis.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
